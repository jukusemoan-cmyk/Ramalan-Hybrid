<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0B0C10;
      background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #050608 100%);
      color: #F3E9D2;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .nav-links {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .nav-links a { color: #C6A434; text-decoration: none; font-size: 0.95rem; }
    .btn-premium-nav {
      background: transparent;
      border: 1.5px solid #C6A434;
      padding: 8px 20px;
      border-radius: 40px;
      color: #C6A434 !important;
      font-weight: 600;
    }
    .mystic-header { text-align: center; margin-bottom: 24px; }
    .mystic-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #F9E076, #C6A434);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
    }
    .oracle-card {
      background: rgba(18, 20, 30, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(198, 164, 52, 0.35);
      border-radius: 40px;
      padding: 32px 24px;
      box-shadow: 0 25px 40px -12px #00000080;
    }
    .input-field { margin-bottom: 24px; }
    .input-field label { display: block; margin-bottom: 8px; color: #B9A9D4; }
    .input-field input {
      width: 100%;
      background: #1A1C2B;
      border: 1.5px solid #3A2E1C;
      border-radius: 40px;
      padding: 16px 20px;
      color: #F0E6D2;
      font-size: 1.1rem;
    }
    .input-field input:focus { border-color: #C6A434; outline: none; }
    .btn-primary {
      background: linear-gradient(145deg, #C6A434, #E9CF7A);
      border: none;
      padding: 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.3rem;
      font-family: 'Cinzel', serif;
      color: #0B0C10;
      cursor: pointer;
      width: 100%;
    }
    .result-panel { margin-top: 32px; }
    .day-summary {
      background: #1C1A2E;
      border: 1px solid #C6A434;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    .day-level { font-size: 2.5rem; font-family: 'Cinzel', serif; color: #EFE1B9; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .detail-item {
      background: #0F111A;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }
    
    .token-display-section { text-align: center; margin: 20px 0; }
    .token-badge {
      background: #1C1A2E;
      border: 2px solid #C6A434;
      border-radius: 40px;
      padding: 12px 32px;
      display: inline-block;
    }
    .token-badge i { color: #C6A434; margin-right: 8px; }
    .token-badge span { font-weight: 700; color: #C6A434; font-size: 1.5rem; margin-left: 8px; }

    .premium-lock { text-align: center; margin-top: 20px; }
    .btn-premium {
      background: transparent;
      border: 2px solid #C6A434;
      color: #C6A434;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .premium-detail {
      background: #1A1C2B;
      border-radius: 24px;
      padding: 24px;
      margin-top: 24px;
      border-left: 8px solid #C6A434;
    }
    .hidden { display: none !important; }
    .footer {
      border-top: 1px solid #3A2E1C;
      padding: 32px 0;
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      color: #9A8CB0;
    }
    .footer a { color: #C6A434; text-decoration: none; margin-left: 24px; }
    @media (max-width: 500px) {
      .detail-grid { grid-template-columns: 1fr; }
      .footer { flex-direction: column; text-align: center; }
      .footer a { margin: 0 12px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="nav-links">
    <div>
      <a href="index.html"><i class="fas fa-arrow-left"></i> Beranda</a>
      <a href="ramalan.html" style="margin-left:16px;"><i class="fas fa-crystal-ball"></i> Ramalan</a>
      <a href="kecocokan.html" style="margin-left:16px;"><i class="fas fa-heart"></i> Kecocokan</a>
      <a href="pustaka.html" style="margin-left:16px;"><i class="fas fa-book-open"></i> Pustaka</a>
    </div>
    <a href="pricing.html" class="btn-premium-nav"><i class="fas fa-coins"></i> Beli Token</a>
  </div>

  <div class="mystic-header">
    <h1><i class="fas fa-sun"></i> Dewasa Ayu</h1>
    <p style="color:#B9A9D4;">Cari hari baik untuk aktivitas pentingmu</p>
  </div>

  <div class="oracle-card">
    <div class="input-field">
      <label><i class="fas fa-calendar-alt"></i> Pilih Tanggal</label>
      <input type="date" id="selectedDate" value="">
    </div>
    
    <button class="btn-primary" id="checkBtn"><i class="fas fa-search"></i> CEK HARI BAIK</button>

    <div id="resultSection" class="result-panel hidden">
      <div class="day-summary">
        <div class="day-level" id="dayLevel">-</div>
        <div class="day-desc" id="dayShortDesc">-</div>
      </div>

      <div class="detail-grid">
        <div class="detail-item">
          <i class="fas fa-calendar-week" style="color:#C6A434;"></i>
          <div><strong id="wukuDisplay">-</strong></div>
          <div style="font-size:0.9rem;">Wuku</div>
        </div>
        <div class="detail-item">
          <i class="fas fa-sun" style="color:#C6A434;"></i>
          <div><strong id="saptawaraDisplay">-</strong></div>
          <div style="font-size:0.9rem;">Saptawara</div>
        </div>
        <div class="detail-item">
          <i class="fas fa-cloud" style="color:#C6A434;"></i>
          <div><strong id="pancawaraDisplay">-</strong></div>
          <div style="font-size:0.9rem;">Pancawara</div>
        </div>
        <div class="detail-item">
          <i class="fas fa-moon" style="color:#C6A434;"></i>
          <div><strong id="triwaraDisplay">-</strong></div>
          <div style="font-size:0.9rem;">Tri Wara</div>
        </div>
      </div>

      <div class="token-display-section">
        <div class="token-badge">
          <i class="fas fa-coins"></i> Sisa Token: <span id="tokenBalanceSpan">0</span>
        </div>
      </div>

      <div class="premium-lock">
        <button class="btn-premium" id="premiumBtn"><i class="fas fa-lock"></i> BUKA ANALISIS MENDALAM (1 Token)</button>
      </div>
      <div id="premiumBox" class="premium-detail hidden"></div>
      <p style="margin-top:16px; font-size:0.9rem;"><i class="fas fa-info-circle"></i> Analisis lengkap untuk member Premium.</p>
    </div>
  </div>

  <footer class="footer">
    <div>© 2026 Oracle Nusantara. Seluruh konten untuk hiburan & refleksi diri.</div>
    <div>
      <a href="disclaimer.html">Disclaimer</a>
      <a href="privacy.html">Privasi</a>
      <a href="mailto:halo@oraclenusantara.id">Kontak</a>
    </div>
  </footer>
</div>

<script src="js/calculator.js"></script>
<script>
let calendarData = null;
let currentDayData = null;

document.addEventListener('DOMContentLoaded', async () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('selectedDate').value = `${yyyy}-${mm}-${dd}`;

  try {
    const res = await fetch('data/bali-calendar.json');
    calendarData = await res.json();
  } catch(e) { console.error('Gagal load data', e); }

  updateTokenDisplay();
  document.getElementById('checkBtn').addEventListener('click', calculate);
  document.getElementById('premiumBtn').addEventListener('click', handlePremium);
});

function updateTokenDisplay() {
    const balance = localStorage.getItem('tokenBalance') || '0';
    document.getElementById('tokenBalanceSpan').textContent = balance;
    const btn = document.getElementById('premiumBtn');
    if (btn) {
        const token = parseInt(balance) || 0;
        if (token > 0) {
            btn.innerHTML = `<i class="fas fa-unlock"></i> BUKA ANALISIS MENDALAM (${token} Token tersedia)`;
        } else {
            btn.innerHTML = '<i class="fas fa-shopping-cart"></i> BELI TOKEN UNTUK BUKA PREMIUM';
        }
    }
}

function getTriWara(saptawara, pancawara) {
  const s = calendarData.saptawara.find(x => x.name === saptawara);
  const p = calendarData.pancawara.find(x => x.name === pancawara);
  if (!s || !p) return null;
  const total = s.urip + p.urip;
  const mod = total % 3;
  const triWaraList = [
    { name: 'Pasah', meaning: 'Jatuh / Selesai', activity: 'Baik untuk penyucian. Tidak baik memulai baru.' },
    { name: 'Beteng', meaning: 'Kuat / Kokoh', activity: 'Baik untuk membuat pagar atau perlindungan.' },
    { name: 'Kajeng', meaning: 'Keras / Sakral', activity: 'Energi kuat. Baik bekerja keras, waspadai konflik.' }
  ];
  return triWaraList[mod === 0 ? 2 : mod - 1];
}

function calculate() {
  if (!calendarData) { alert('Data masih dimuat.'); return; }
  const dateStr = document.getElementById('selectedDate').value;
  if (!dateStr) { alert('Pilih tanggal.'); return; }
  
  const date = new Date(dateStr);
  const weton = getWeton(date);
  const wuku = getWuku(date);
  const triWara = getTriWara(weton.saptawara, weton.pancawara);
  const wukuData = calendarData.wuku.find(w => w.name === wuku.name);
  
  let level = 'Cukup';
  if (wukuData) {
    if (wukuData.activity.includes('Sangat baik')) level = 'Sangat Baik';
    else if (wukuData.activity.includes('Baik')) level = 'Baik';
    else if (wukuData.activity.includes('Tidak baik')) level = 'Kurang Baik';
  }
  
  document.getElementById('dayLevel').textContent = level;
  document.getElementById('dayShortDesc').textContent = wukuData?.activity || '-';
  document.getElementById('wukuDisplay').textContent = `${wuku.name} (${wukuData?.meaning || ''})`;
  document.getElementById('saptawaraDisplay').textContent = weton.saptawara;
  document.getElementById('pancawaraDisplay').textContent = weton.pancawara;
  document.getElementById('triwaraDisplay').textContent = triWara ? `${triWara.name}` : '-';
  
  currentDayData = { date: dateStr, weton, wuku: wukuData, triWara, level };
  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('premiumBox').classList.add('hidden');
}

function handlePremium() {
  let tokenBalance = parseInt(localStorage.getItem('tokenBalance') || '0');
  
  if (tokenBalance > 0) {
    tokenBalance -= 1;
    localStorage.setItem('tokenBalance', tokenBalance);
    displayPremiumContent();
    updateTokenDisplay();
    alert(`✅ 1 Token digunakan. Sisa ${tokenBalance} Token.`);
  } else {
    if (confirm('Token Anda habis. Ingin membeli token sekarang?')) {
      window.location.href = 'pricing.html';
    }
  }
}

function displayPremiumContent() {
  if (!currentDayData) { alert('Cek hari baik dulu.'); return; }
  const d = currentDayData;
  const w = d.wuku;
  const t = d.triWara;
  
  let rekomendasi = '';
  if (d.level === 'Sangat Baik') rekomendasi = 'Sangat baik untuk memulai usaha, menikah, atau upacara penting.';
  else if (d.level === 'Baik') rekomendasi = 'Baik untuk aktivitas rutin, bekerja, dan silaturahmi.';
  else if (d.level === 'Cukup') rekomendasi = 'Cukup baik. Tunda keputusan besar.';
  else rekomendasi = 'Kurang baik memulai hal baru. Lebih baik istirahat.';
  
  const html = `
    <h3 style="color:#C6A434;"><i class="fas fa-crown"></i> Analisis Dewasa Ayu</h3>
    <p><strong>${d.date}</strong> | Wuku: ${w.name} (${w.meaning})</p>
    <p>${w.character}</p>
    <p><i class="fas fa-check-circle"></i> <strong>Anjuran:</strong> ${w.activity}</p>
    <p><i class="fas fa-ban"></i> <strong>Pantangan:</strong> ${w.forbidden_direction}</p>
    <p><strong>Tri Wara ${t.name}:</strong> ${t.activity}</p>
    <div style="background:#0F111A; padding:16px; border-radius:16px; margin-top:16px;">
      <p><i class="fas fa-lightbulb"></i> <strong>Rekomendasi:</strong> ${rekomendasi}</p>
    </div>
  `;
  document.getElementById('premiumBox').innerHTML = html;
  document.getElementById('premiumBox').classList.remove('hidden');
}
</script>
</body>
</html>
