<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Pustaka Primbon • Wariga Bali</title>
  <meta name="description" content="Pelajari makna Wuku, Saptawara, Pancawara, Tri Wara, dan istilah Primbon Bali lainnya.">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0B0C10;
      background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #050608 100%);
      color: #F3E9D2;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .nav-links {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .nav-links a { color: #C6A434; text-decoration: none; font-size: 0.95rem; }
    .btn-premium-nav {
      background: transparent;
      border: 1.5px solid #C6A434;
      padding: 8px 20px;
      border-radius: 40px;
      color: #C6A434 !important;
      font-weight: 600;
    }
    .mystic-header { text-align: center; margin-bottom: 24px; }
    .mystic-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #F9E076, #C6A434);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .oracle-card {
      background: rgba(18, 20, 30, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(198, 164, 52, 0.35);
      border-radius: 40px;
      padding: 32px 24px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .tab-btn {
      background: #0F111A;
      border: 1px solid #3A2E1C;
      color: #B9A9D4;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #C6A434;
      color: #0B0C10;
      border-color: #C6A434;
    }
    .search-box { margin-bottom: 24px; }
    .search-box input {
      width: 100%;
      background: #1A1C2B;
      border: 1.5px solid #3A2E1C;
      border-radius: 40px;
      padding: 14px 20px;
      color: #F0E6D2;
      font-size: 1rem;
    }
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .pustaka-card {
      background: #0F111A;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #3A2E1C;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .pustaka-card:hover { transform: translateY(-4px); border-color: #C6A434; }
    .pustaka-card h3 { color: #C6A434; margin-bottom: 8px; }
    .pustaka-card .sub { color: #9A8CB0; font-size: 0.9rem; }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5,6,8,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #1A1C2B;
      border: 1px solid #C6A434;
      border-radius: 32px;
      padding: 32px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: #C6A434;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .premium-lock {
      margin-top: 20px;
      text-align: center;
    }
    .btn-premium {
      background: transparent;
      border: 2px solid #C6A434;
      color: #C6A434;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
    }
    .hidden { display: none !important; }
    .footer-note { text-align: center; margin-top: 32px; opacity: 0.8; }
  </style>
</head>
<body>
<div class="container">
  <div class="nav-links">
    <div>
      <a href="index.html"><i class="fas fa-arrow-left"></i> Beranda</a>
      <a href="ramalan.html" style="margin-left:16px;"><i class="fas fa-crystal-ball"></i> Ramalan</a>
      <a href="kecocokan.html" style="margin-left:16px;"><i class="fas fa-heart"></i> Kecocokan</a>
      <a href="dewasa-ayu.html" style="margin-left:16px;"><i class="fas fa-sun"></i> Dewasa Ayu</a>
    </div>
    <a href="pricing.html" class="btn-premium-nav"><i class="fas fa-crown"></i> Premium</a>
  </div>

  <div class="mystic-header">
    <h1><i class="fas fa-book-open"></i> Pustaka Primbon</h1>
    <p style="color:#B9A9D4;">Kamus lengkap istilah Wariga Bali</p>
  </div>

  <div class="oracle-card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="wuku">30 Wuku</button>
      <button class="tab-btn" data-tab="saptawara">Saptawara</button>
      <button class="tab-btn" data-tab="pancawara">Pancawara</button>
      <button class="tab-btn" data-tab="triwara">Tri Wara</button>
      <button class="tab-btn" data-tab="hariraya">Hari Raya</button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari...">
    </div>

    <div id="contentArea" class="item-grid"></div>
  </div>
  <div class="footer-note">✦ Pengetahuan adalah kunci kebijaksanaan ✦</div>
</div>

<!-- Modal Detail -->
<div id="detailModal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
    <div id="premiumLockArea" class="premium-lock hidden">
      <button class="btn-premium" id="unlockPremiumDetail"><i class="fas fa-lock"></i> Buka Konten Premium</button>
    </div>
    <div id="premiumContentArea" class="hidden"></div>
  </div>
</div>

<script src="js/calculator.js"></script>
<script>
let calendarData = null;
let currentTab = 'wuku';
let currentDetailItem = null;

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('data/bali-calendar.json');
    calendarData = await res.json();
    renderContent();
  } catch(e) {
    console.error('Gagal load data', e);
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderContent();
    });
  });

  document.getElementById('searchInput').addEventListener('input', renderContent);
  document.getElementById('unlockPremiumDetail').addEventListener('click', handleUnlockPremium);
});

function renderContent() {
  if (!calendarData) return;
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  let items = [];
  
  if (currentTab === 'wuku') {
    items = calendarData.wuku;
  } else if (currentTab === 'saptawara') {
    items = calendarData.saptawara;
  } else if (currentTab === 'pancawara') {
    items = calendarData.pancawara;
  } else if (currentTab === 'triwara') {
    items = calendarData.wewaran_dasar?.tri_wara || [];
  } else if (currentTab === 'hariraya') {
    items = calendarData.hari_raya || [];
  }

  const filtered = items.filter(item => 
    item.name.toLowerCase().includes(searchTerm) || 
    (item.meaning && item.meaning.toLowerCase().includes(searchTerm)) ||
    (item.character && item.character.toLowerCase().includes(searchTerm))
  );

  const html = filtered.map(item => `
    <div class="pustaka-card" onclick="showDetail('${currentTab}', '${item.name}')">
      <h3>${item.name}</h3>
      <div class="sub">${item.meaning || item.alias || ''}</div>
      <p style="margin-top:8px; font-size:0.9rem;">${(item.character || item.description || '').substring(0, 60)}...</p>
    </div>
  `).join('');
  
  document.getElementById('contentArea').innerHTML = html || '<p style="text-align:center; grid-column:1/-1;">Tidak ditemukan</p>';
}

function showDetail(type, name) {
  let item;
  if (type === 'wuku') item = calendarData.wuku.find(w => w.name === name);
  else if (type === 'saptawara') item = calendarData.saptawara.find(s => s.name === name);
  else if (type === 'pancawara') item = calendarData.pancawara.find(p => p.name === name);
  else if (type === 'triwara') item = calendarData.wewaran_dasar.tri_wara.find(t => t.name === name);
  else if (type === 'hariraya') item = calendarData.hari_raya.find(h => h.name === name);
  
  if (!item) return;
  currentDetailItem = { type, item };
  
  let basicHtml = `
    <h2 style="color:#C6A434; margin-bottom:16px;">${item.name}</h2>
    <p><strong>Makna:</strong> ${item.meaning || item.alias || '-'}</p>
    <p style="margin-top:12px;"><strong>Deskripsi:</strong> ${item.character || item.description || '-'}</p>
  `;
  
  if (type === 'wuku') {
    basicHtml += `
      <p style="margin-top:12px;"><i class="fas fa-check-circle"></i> <strong>Aktivitas Baik:</strong> ${item.activity || '-'}</p>
      <p style="margin-top:12px;"><i class="fas fa-ban"></i> <strong>Pantangan:</strong> ${item.forbidden_direction || '-'}</p>
      <p style="margin-top:12px;"><i class="fas fa-leaf"></i> <strong>Elemen:</strong> ${item.element || '-'}</p>
    `;
  }
  
  if (type === 'triwara') {
    basicHtml += `<p style="margin-top:12px;"><i class="fas fa-tasks"></i> <strong>Rekomendasi Aktivitas:</strong> ${item.activity || '-'}</p>`;
  }
  
  document.getElementById('modalBody').innerHTML = basicHtml;
  
  const premiumHtml = `
    <div style="margin-top:20px; padding-top:20px; border-top:1px solid #3A2E1C;">
      <h4 style="color:#C6A434;"><i class="fas fa-crown"></i> Pengetahuan Premium</h4>
      <p style="margin-top:12px;"><strong>Ritual yang Disarankan:</strong> ${getPremiumRitual(type, item)}</p>
      <p style="margin-top:12px;"><strong>Mantra / Doa:</strong> ${getPremiumMantra(type, item)}</p>
      <p style="margin-top:12px;"><strong>Filosofi Mendalam:</strong> ${getPremiumPhilosophy(type, item)}</p>
    </div>
  `;
  
  document.getElementById('premiumContentArea').innerHTML = premiumHtml;
  
  // Cek status premium
  if (localStorage.getItem('isPremium') === 'true') {
    const expiry = localStorage.getItem('premiumExpiry');
    if (expiry && new Date(expiry) > new Date()) {
      document.getElementById('premiumLockArea').classList.add('hidden');
      document.getElementById('premiumContentArea').classList.remove('hidden');
    } else {
      localStorage.removeItem('isPremium');
      localStorage.removeItem('premiumExpiry');
      document.getElementById('premiumLockArea').classList.remove('hidden');
      document.getElementById('premiumContentArea').classList.add('hidden');
    }
  } else {
    document.getElementById('premiumLockArea').classList.remove('hidden');
    document.getElementById('premiumContentArea').classList.add('hidden');
  }
  
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
}

function handleUnlockPremium() {
  if (localStorage.getItem('isPremium') === 'true') {
    const expiry = localStorage.getItem('premiumExpiry');
    if (expiry && new Date(expiry) > new Date()) {
      document.getElementById('premiumLockArea').classList.add('hidden');
      document.getElementById('premiumContentArea').classList.remove('hidden');
    } else {
      localStorage.removeItem('isPremium');
      localStorage.removeItem('premiumExpiry');
      window.location.href = 'pricing.html';
    }
  } else {
    window.location.href = 'pricing.html';
  }
}

function getPremiumRitual(type, item) {
  if (type === 'wuku') return `Pada Wuku ${item.name}, dianjurkan melakukan upacara kecil dengan sesajen canang sari dan bunga ${item.element === 'Api' ? 'merah' : item.element === 'Air' ? 'putih' : 'kuning'}.`;
  if (type === 'hariraya') return `Saat ${item.name}, lakukan persembahyangan dan meditasi. ${item.description}`;
  return 'Lakukan meditasi singkat di pagi hari menghadap matahari terbit.';
}

function getPremiumMantra(type, item) {
  if (type === 'wuku') return `"Om ${item.meaning.replace('Dewa ', '')} Ya Namah" – diucapkan 108 kali untuk memohon perlindungan.`;
  if (type === 'hariraya') return `"Om Swastiastu, semoga berkah ${item.name} membersihkan jiwa raga."`;
  return '"Om Swastiastu" – ucapkan dengan hati tulus sebelum memulai aktivitas.';
}

function getPremiumPhilosophy(type, item) {
  if (type === 'wuku') return `${item.name} mengajarkan kita tentang ${item.character?.split(',')[0] || 'keseimbangan'}. Dalam lontar kuno, energi ini selaras dengan perjalanan spiritual menuju pencerahan.`;
  if (type === 'hariraya') return `${item.name} adalah momen sakral untuk merenungkan ${item.description.toLowerCase()}. Filosofinya mengajak kita kembali ke esensi diri.`;
  return 'Setiap elemen dalam Wariga adalah cerminan dari hukum alam (Rta). Memahaminya berarti menyelaraskan diri dengan ritme semesta.';
}
</script>
</body>
</html>
