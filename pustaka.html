<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=1.0">
  <title>Pustaka • Oracle Nusantara</title>
  <meta name="description" content="Ensiklopedia lengkap: Wuku, Weton, Zodiak, Shio, BaZi, dan Primbon Bali.">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .mystic-header { text-align: center; margin-bottom: 32px; }
    .mystic-header h1 { font-size: 3rem; letter-spacing: 2px; }
    
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: #A0A0B0;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    .tab-btn.active {
      background: #D4AF37;
      color: #0A0A0C;
      border-color: #D4AF37;
    }
    .tab-btn:hover { border-color: #D4AF37; color: #D4AF37; }
    
    .search-box { margin-bottom: 28px; }
    .search-box input {
      width: 100%;
      background: rgba(15, 15, 20, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 40px;
      padding: 16px 22px;
      color: #E5E5E5;
      font-size: 1rem;
    }
    .search-box input:focus { outline: none; border-color: #D4AF37; }
    
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .pustaka-card {
      background: rgba(15, 15, 20, 0.6);
      border-radius: 20px;
      padding: 24px 20px;
      border: 1px solid rgba(212, 175, 55, 0.1);
      cursor: pointer;
      transition: all 0.2s;
    }
    .pustaka-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(20, 20, 25, 0.8);
    }
    .pustaka-card h3 { color: #D4AF37; margin-bottom: 8px; }
    .pustaka-card .sub { color: #A0A0B0; font-size: 0.9rem; }
    
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 12, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #1A1C2B;
      border: 1px solid #D4AF37;
      border-radius: 32px;
      padding: 36px 32px;
      max-width: 650px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: #D4AF37;
      font-size: 1.8rem;
      cursor: pointer;
    }
    
    .token-badge-small {
      background: rgba(15, 15, 20, 0.8);
      border: 1px solid #D4AF37;
      border-radius: 40px;
      padding: 8px 20px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .token-badge-small i { color: #D4AF37; margin-right: 6px; }
    .token-badge-small span { font-weight: 600; color: #D4AF37; margin-left: 6px; }
  </style>
</head>
<body>
<div class="container">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo"><a href="index.html">ORACLE NUSANTARA</a></div>
    <div class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="ramalan.html">Ramalan</a>
      <a href="kecocokan.html">Kecocokan</a>
      <a href="dewasa-ayu.html">Dewasa Ayu</a>
      <a href="pricing.html" class="btn-premium-nav"><i class="fas fa-coins"></i> Token</a>
    </div>
  </nav>

  <div class="mystic-header">
    <h1><i class="fas fa-book-open"></i> Pustaka Semesta</h1>
    <p style="color: #A0A0B0;">Ensiklopedia Wuku • Zodiak • Shio • BaZi</p>
  </div>

  <div class="oracle-card">
    <div style="text-align: right;">
      <div class="token-badge-small">
        <i class="fas fa-coins"></i> Sisa Token: <span id="tokenBalanceSpan">0</span>
      </div>
    </div>

    <!-- Tabs - Semua Kategori -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="wuku">30 Wuku</button>
      <button class="tab-btn" data-tab="saptawara">Saptawara</button>
      <button class="tab-btn" data-tab="pancawara">Pancawara</button>
      <button class="tab-btn" data-tab="triwara">Tri Wara</button>
      <button class="tab-btn" data-tab="hariraya">Hari Raya</button>
      <button class="tab-btn" data-tab="zodiak">12 Zodiak</button>
      <button class="tab-btn" data-tab="shio">12 Shio</button>
      <button class="tab-btn" data-tab="stems">10 Batang Langit</button>
      <button class="tab-btn" data-tab="branches">12 Cabang Bumi</button>
      <button class="tab-btn" data-tab="tengods">10 Dewa</button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari di semua kategori...">
    </div>

    <div id="contentArea" class="item-grid"></div>
  </div>

  <footer class="footer">
    <div>© 2026 Oracle Nusantara. Seluruh konten untuk hiburan & refleksi diri.</div>
    <div>
      <a href="disclaimer.html">Disclaimer</a>
      <a href="privacy.html">Privasi</a>
      <a href="mailto:halo@oraclenusantara.id">Kontak</a>
    </div>
  </footer>
</div>

<!-- Modal -->
<div id="detailModal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalBody"></div>
    <div id="premiumLockArea" class="premium-lock hidden" style="margin-top: 24px; text-align: center;">
      <button class="btn-premium" id="unlockPremiumDetail"><i class="fas fa-lock"></i> Buka Konten Premium (1 Token)</button>
    </div>
    <div id="premiumContentArea" class="hidden"></div>
  </div>
</div>

<!-- JavaScript Modules -->
<script src="js/calculator.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/ui-controller.js"></script>
<script src="js/premium.js"></script>

<script>
// ================== INISIALISASI HALAMAN PUSTAKA ==================
let calendarData = null;
let zodiacShioData = null;
let baziStemsBranches = null;
let baziTenGods = null;
let currentTab = 'wuku';
let currentDetailItem = null;

const elements = {
    contentArea: null, searchInput: null,
    modal: null, modalBody: null, premiumLockArea: null, premiumContentArea: null
};

function initDOMElements() {
    elements.contentArea = document.getElementById('contentArea');
    elements.searchInput = document.getElementById('searchInput');
    elements.modal = document.getElementById('detailModal');
    elements.modalBody = document.getElementById('modalBody');
    elements.premiumLockArea = document.getElementById('premiumLockArea');
    elements.premiumContentArea = document.getElementById('premiumContentArea');
}

async function loadAllPustakaData() {
    try {
        const [cal, zodiac, baziStem, baziGod] = await Promise.all([
            fetchJSON('data/bali-calendar.json'),
            fetchJSON('data/zodiac-shio.json'),
            fetchJSON('data/bazi-stems-branches.json'),
            fetchJSON('data/bazi-ten-gods.json')
        ]);
        calendarData = cal;
        zodiacShioData = zodiac;
        baziStemsBranches = baziStem;
        baziTenGods = baziGod;
    } catch(e) {
        console.error('Gagal load data pustaka:', e);
        throw e;
    }
}

function getItemsForTab(tab) {
    if (tab === 'wuku') return calendarData?.wuku || [];
    if (tab === 'saptawara') return calendarData?.saptawara || [];
    if (tab === 'pancawara') return calendarData?.pancawara || [];
    if (tab === 'triwara') return calendarData?.wewaran_dasar?.tri_wara || [];
    if (tab === 'hariraya') return calendarData?.hari_raya || [];
    if (tab === 'zodiak') return zodiacShioData?.zodiacs || [];
    if (tab === 'shio') return zodiacShioData?.shios || [];
    if (tab === 'stems') return baziStemsBranches?.stems || [];
    if (tab === 'branches') return baziStemsBranches?.branches || [];
    if (tab === 'tengods') return baziTenGods?.ten_gods || [];
    return [];
}

function renderContent() {
    const searchTerm = elements.searchInput.value.toLowerCase();
    const items = getItemsForTab(currentTab);
    
    const filtered = items.filter(item => {
        const name = item.name || '';
        const meaning = item.meaning || item.alias || item.chinese || '';
        const desc = item.character || item.description || item.element_relation || '';
        return name.toLowerCase().includes(searchTerm) || 
               meaning.toLowerCase().includes(searchTerm) ||
               desc.toLowerCase().includes(searchTerm);
    });
    
    const html = filtered.map(item => {
        let subtitle = item.meaning || item.alias || item.chinese || '';
        if (item.element) subtitle = `${subtitle} • ${item.element}`;
        if (item.animal) subtitle = `${subtitle} • ${item.animal}`;
        
        return `
            <div class="pustaka-card" onclick="showDetail('${currentTab}', '${item.name.replace(/'/g, "\\'")}')">
                <h3>${item.name}</h3>
                <div class="sub">${subtitle}</div>
                <p style="margin-top: 12px; font-size: 0.9rem; color: #B0B0C0;">
                    ${(item.character || item.description || item.positive_traits?.join(', ') || '').substring(0, 70)}...
                </p>
            </div>
        `;
    }).join('');
    
    elements.contentArea.innerHTML = html || '<p style="text-align: center; grid-column: 1/-1; color: #A0A0B0;">Tidak ditemukan</p>';
}

function showDetail(type, name) {
    const items = getItemsForTab(type);
    const item = items.find(i => i.name === name);
    if (!item) return;
    
    currentDetailItem = { type, item };
    
    let basicHtml = `<h2 style="color: #D4AF37; margin-bottom: 24px;">${item.name}`;
    if (item.chinese) basicHtml += ` (${item.chinese})`;
    basicHtml += `</h2>`;
    
    if (item.meaning) basicHtml += `<p><strong style="color: #F3E5AB;">Makna:</strong> ${item.meaning}</p>`;
    if (item.alias) basicHtml += `<p><strong style="color: #F3E5AB;">Alias:</strong> ${item.alias}</p>`;
    if (item.element) basicHtml += `<p><strong style="color: #F3E5AB;">Elemen:</strong> ${item.element}</p>`;
    if (item.polarity) basicHtml += `<p><strong style="color: #F3E5AB;">Polaritas:</strong> ${item.polarity}</p>`;
    if (item.animal) basicHtml += `<p><strong style="color: #F3E5AB;">Shio:</strong> ${item.animal}</p>`;
    if (item.direction) basicHtml += `<p><strong style="color: #F3E5AB;">Arah:</strong> ${item.direction}</p>`;
    if (item.color) basicHtml += `<p><strong style="color: #F3E5AB;">Warna:</strong> ${item.color}</p>`;
    if (item.planet) basicHtml += `<p><strong style="color: #F3E5AB;">Planet:</strong> ${item.planet}</p>`;
    
    basicHtml += `<p style="margin-top: 16px;"><strong style="color: #F3E5AB;">Deskripsi:</strong> ${item.character || item.description || '-'}</p>`;
    
    if (type === 'wuku') {
        basicHtml += `
            <p style="margin-top: 16px;"><i class="fas fa-check-circle" style="color: #D4AF37;"></i> <strong>Aktivitas Baik:</strong> ${item.activity || '-'}</p>
            <p style="margin-top: 12px;"><i class="fas fa-ban" style="color: #D4AF37;"></i> <strong>Pantangan:</strong> ${item.forbidden_direction || '-'}</p>
        `;
    }
    
    if (type === 'zodiak') {
        basicHtml += `
            <p style="margin-top: 16px;"><strong>Kelebihan:</strong> ${item.strengths?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Kekurangan:</strong> ${item.weaknesses?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Karir Cocok:</strong> ${item.career_match?.join(', ') || '-'}</p>
        `;
    }
    
    if (type === 'shio') {
        basicHtml += `
            <p style="margin-top: 16px;"><strong>Kelebihan:</strong> ${item.strengths?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Kekurangan:</strong> ${item.weaknesses?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Karir Cocok:</strong> ${item.career_match?.join(', ') || '-'}</p>
        `;
    }
    
    if (type === 'tengods') {
        basicHtml += `
            <p style="margin-top: 16px;"><strong>Hubungan Elemen:</strong> ${item.element_relation || '-'}</p>
            <p style="margin-top: 12px;"><strong>Sifat Positif:</strong> ${item.positive_traits?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Sifat Negatif:</strong> ${item.negative_traits?.join(', ') || '-'}</p>
            <p style="margin-top: 12px;"><strong>Karir Cocok:</strong> ${item.career?.join(', ') || '-'}</p>
        `;
    }
    
    elements.modalBody.innerHTML = basicHtml;
    
    // Konten premium
    const premiumHtml = `
        <div style="margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
            <h4 style="color: #D4AF37; margin-bottom: 16px;"><i class="fas fa-crown"></i> Pengetahuan Premium</h4>
            <p style="margin-top: 12px;"><strong>Ritual yang Disarankan:</strong> ${getPremiumRitual(type, item)}</p>
            <p style="margin-top: 12px;"><strong>Mantra / Doa:</strong> ${getPremiumMantra(type, item)}</p>
            <p style="margin-top: 12px;"><strong>Filosofi Mendalam:</strong> ${getPremiumPhilosophy(type, item)}</p>
        </div>
    `;
    
    elements.premiumContentArea.innerHTML = premiumHtml;
    
    const hasTokenUnlocked = hasToken();
    elements.premiumLockArea.classList.toggle('hidden', hasTokenUnlocked);
    elements.premiumContentArea.classList.toggle('hidden', !hasTokenUnlocked);
    
    elements.modal.classList.remove('hidden');
}

function closeModal() {
    elements.modal.classList.add('hidden');
}

function getPremiumRitual(type, item) {
    if (type === 'wuku') return `Sesajen canang sari dengan bunga ${item.element === 'Api' ? 'merah' : item.element === 'Air' ? 'putih' : 'kuning'}.`;
    if (type === 'zodiak') return `Meditasi pada hari ${item.ruling_planet || 'Minggu'} saat bulan purnama.`;
    if (type === 'shio') return `Bawa jimat dengan simbol ${item.name} untuk keberuntungan.`;
    if (type === 'stems') return `Aktifkan energi ${item.name} dengan menghadap ${item.direction}.`;
    if (type === 'tengods') return `Perkuat ${item.name} dengan melakukan amal di bidang ${item.career?.[0] || 'sosial'}.`;
    return 'Lakukan meditasi pagi menghadap matahari terbit.';
}

function getPremiumMantra(type, item) {
    if (type === 'wuku') return `"Om ${item.meaning?.replace('Dewa ', '') || ''} Ya Namah" 108x.`;
    if (type === 'zodiak') return `"Om ${item.name} Adhipataye Namah"`;
    if (type === 'shio') return `"Om ${item.chinese_name || ''} Shou Ya Namah"`;
    if (type === 'stems') return `"Om ${item.name} Devaya Namah"`;
    if (type === 'tengods') return `"Om ${item.chinese || ''} Siddhi Rastu"`;
    return '"Om Swastiastu" dengan hati tulus.';
}

function getPremiumPhilosophy(type, item) {
    if (type === 'wuku') return `${item.name} mengajarkan ${item.character?.split(',')[0] || 'keseimbangan'}.`;
    if (type === 'zodiak') return `${item.name} adalah cerminan energi ${item.element}. ${item.description?.substring(0, 100)}...`;
    if (type === 'shio') return `${item.name} melambangkan ${item.traits?.join(', ') || 'keunikan'}.`;
    if (type === 'tengods') return `${item.name} adalah kunci untuk memahami ${item.element_relation?.toLowerCase()}.`;
    return 'Setiap elemen adalah cerminan hukum alam (Rta).';
}

function handleUnlock() {
    if (hasToken()) {
        const remaining = deductToken();
        elements.premiumLockArea.classList.add('hidden');
        elements.premiumContentArea.classList.remove('hidden');
        updateTokenDisplay();
        showSuccessToast(`✅ 1 Token digunakan. Sisa ${remaining} Token.`);
    } else {
        if (confirm('Token Anda habis. Ingin membeli token sekarang?')) {
            window.location.href = 'pricing.html';
        }
    }
}

async function init() {
    initDOMElements();
    
    try {
        await loadAllPustakaData();
        renderContent();
    } catch(e) {
        alert('Gagal memuat data pustaka.');
        return;
    }
    
    updateTokenDisplay();
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            renderContent();
        });
    });
    
    elements.searchInput.addEventListener('input', renderContent);
    document.getElementById('unlockPremiumDetail').addEventListener('click', handleUnlock);
    
    window.closeModal = closeModal;
    window.showDetail = showDetail;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
