<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Kecocokan Jodoh • Primbon Bali</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0B0C10;
      background-image: radial-gradient(circle at 20% 30%, #1a1f2e 0%, #050608 100%);
      color: #F3E9D2;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .mystic-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .mystic-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      background: linear-gradient(135deg, #F9E076, #C6A434);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 4px;
    }
    .oracle-card {
      background: rgba(18, 20, 30, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(198, 164, 52, 0.35);
      border-radius: 48px;
      padding: 36px 28px;
      box-shadow: 0 25px 40px -12px #00000080;
    }
    .couple-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (max-width: 600px) {
      .couple-form { grid-template-columns: 1fr; }
    }
    .person-card {
      background: #0F111A;
      border-radius: 32px;
      padding: 24px;
      border: 1px solid #3A2E1C;
    }
    .person-card h3 {
      font-family: 'Cinzel', serif;
      color: #C6A434;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .input-field {
      margin-bottom: 16px;
    }
    .input-field label {
      display: block;
      margin-bottom: 6px;
      color: #B9A9D4;
    }
    .input-field input {
      width: 100%;
      background: #1A1C2B;
      border: 1.5px solid #3A2E1C;
      border-radius: 40px;
      padding: 14px 18px;
      color: #F0E6D2;
      font-size: 1rem;
    }
    .input-field input:focus {
      border-color: #C6A434;
      outline: none;
    }
    .btn-primary {
      background: linear-gradient(145deg, #C6A434, #E9CF7A);
      border: none;
      padding: 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.3rem;
      font-family: 'Cinzel', serif;
      color: #0B0C10;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 10px 18px #00000050;
    }
    .result-panel {
      margin-top: 32px;
    }
    .neptu-summary {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .neptu-box {
      text-align: center;
    }
    .neptu-number {
      font-size: 3rem;
      font-weight: 700;
      color: #C6A434;
    }
    .category-badge {
      background: #1C1A2E;
      border: 1px solid #C6A434;
      border-radius: 100px;
      padding: 16px 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    .category-name {
      font-size: 2rem;
      font-family: 'Cinzel', serif;
      color: #EFE1B9;
    }
    .premium-lock {
      text-align: center;
      margin-top: 24px;
    }
    .btn-premium {
      background: transparent;
      border: 2px solid #C6A434;
      color: #C6A434;
      padding: 16px 32px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .premium-detail {
      background: #1A1C2B;
      border-radius: 24px;
      padding: 24px;
      margin-top: 24px;
      border-left: 8px solid #C6A434;
    }
    .hidden { display: none !important; }
    .footer-note {
      text-align: center;
      margin-top: 32px;
      opacity: 0.8;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #C6A434;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
  
  <div class="mystic-header">
    <h1><i class="fas fa-heart"></i> Kecocokan Jodoh</h1>
    <p style="color:#B9A9D4;">Berdasarkan Weton & Neptu Primbon Bali</p>
  </div>

  <div class="oracle-card">
    <div class="couple-form">
      <!-- Pasangan 1 -->
      <div class="person-card">
        <h3><i class="fas fa-user"></i> Diri Anda</h3>
        <div class="input-field">
          <label>Nama</label>
          <input type="text" id="name1" placeholder="Nama Anda" value="">
        </div>
        <div class="input-field">
          <label>Tanggal Lahir</label>
          <input type="date" id="birth1" value="">
        </div>
      </div>
      <!-- Pasangan 2 -->
      <div class="person-card">
        <h3><i class="fas fa-user"></i> Pasangan</h3>
        <div class="input-field">
          <label>Nama</label>
          <input type="text" id="name2" placeholder="Nama Pasangan" value="">
        </div>
        <div class="input-field">
          <label>Tanggal Lahir</label>
          <input type="date" id="birth2" value="">
        </div>
      </div>
    </div>
    
    <button class="btn-primary" id="checkBtn"><i class="fas fa-calculator"></i> HITUNG KECOCOKAN</button>

    <!-- HASIL -->
    <div id="resultSection" class="result-panel hidden">
      <div class="neptu-summary">
        <div class="neptu-box">
          <div id="name1Display" class="badge">...</div>
          <div class="neptu-number" id="neptu1">0</div>
          <div id="weton1Display">-</div>
        </div>
        <div style="font-size:2rem; align-self:center;">+</div>
        <div class="neptu-box">
          <div id="name2Display" class="badge">...</div>
          <div class="neptu-number" id="neptu2">0</div>
          <div id="weton2Display">-</div>
        </div>
        <div style="font-size:2rem; align-self:center;">=</div>
        <div class="neptu-box">
          <div class="badge">Total</div>
          <div class="neptu-number" id="totalNeptu">0</div>
        </div>
      </div>

      <div class="category-badge" id="categoryDisplay">
        <div class="category-name" id="categoryName">-</div>
        <div id="categoryDesc" style="margin-top:8px;">-</div>
      </div>

      <!-- Tombol Premium -->
      <div class="premium-lock">
        <button class="btn-premium" id="premiumBtn"><i class="fas fa-lock"></i> BUKA ANALISIS MENDALAM</button>
      </div>
      <div id="premiumBox" class="premium-detail hidden"></div>
      <p style="margin-top:16px; font-size:0.9rem;"><i class="fas fa-info-circle"></i> Versi gratis menampilkan kategori & deskripsi singkat. Analisis mendalam tersedia untuk member.</p>
    </div>
  </div>
  <div class="footer-note">✦ Ramalan untuk hiburan & introspeksi ✦</div>
</div>

<script src="js/calculator.js"></script>
<script>
// Data kecocokan akan diambil dari bali-weton.json
let kecocokanData = null;
let currentResult = null; // menyimpan hasil perhitungan untuk premium

document.addEventListener('DOMContentLoaded', async () => {
  // Set default date
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('birth1').value = `${yyyy}-${mm}-${dd}`;
  document.getElementById('birth2').value = `${yyyy}-${mm}-${dd}`;

  // Load data kecocokan
  try {
    const res = await fetch('data/bali-weton.json');
    kecocokanData = await res.json();
  } catch(e) {
    console.error('Gagal load data kecocokan');
  }

  document.getElementById('checkBtn').addEventListener('click', calculate);
  document.getElementById('premiumBtn').addEventListener('click', showPremium);
});

async function calculate() {
  const name1 = document.getElementById('name1').value.trim() || 'Anda';
  const name2 = document.getElementById('name2').value.trim() || 'Pasangan';
  const birth1 = document.getElementById('birth1').value;
  const birth2 = document.getElementById('birth2').value;
  if (!birth1 || !birth2) {
    alert('Lengkapi tanggal lahir keduanya.');
    return;
  }

  // Ambil data kalender (butuh urip)
  let calendarData;
  try {
    const res = await fetch('data/bali-calendar.json');
    calendarData = await res.json();
  } catch(e) {
    alert('Gagal memuat data kalender.');
    return;
  }

  // Hitung weton & neptu untuk masing-masing
  const date1 = new Date(birth1);
  const date2 = new Date(birth2);
  
  const weton1 = getWeton(date1);
  const weton2 = getWeton(date2);
  
  const neptu1 = calculateNeptu(weton1.saptawara, weton1.pancawara, calendarData.saptawara, calendarData.pancawara);
  const neptu2 = calculateNeptu(weton2.saptawara, weton2.pancawara, calendarData.saptawara, calendarData.pancawara);
  const total = neptu1 + neptu2;

  // Tampilkan data dasar
  document.getElementById('name1Display').textContent = name1;
  document.getElementById('name2Display').textContent = name2;
  document.getElementById('neptu1').textContent = neptu1;
  document.getElementById('neptu2').textContent = neptu2;
  document.getElementById('weton1Display').textContent = weton1.combo;
  document.getElementById('weton2Display').textContent = weton2.combo;
  document.getElementById('totalNeptu').textContent = total;

  // Cari kategori kecocokan
  const kategori = kecocokanData.kecocokan_jodoh.find(k => total >= k.min_neptu && total <= k.max_neptu);
  if (kategori) {
    document.getElementById('categoryName').textContent = `${kategori.category} (${kategori.status})`;
    document.getElementById('categoryDesc').textContent = kategori.description;
    currentResult = {
      name1, name2,
      weton1: weton1.combo, neptu1,
      weton2: weton2.combo, neptu2,
      total,
      category: kategori.category,
      status: kategori.status,
      desc: kategori.description
    };
  } else {
    document.getElementById('categoryName').textContent = 'Tidak Diketahui';
    currentResult = null;
  }

  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('premiumBox').classList.add('hidden');
}

function showPremium() {
  if (!currentResult) {
    alert('Lakukan perhitungan dulu.');
    return;
  }
  
  // Analisis mendalam (contoh)
  const r = currentResult;
  let saran = '';
  if (r.total >= 25) saran = 'Pasangan ini memiliki potensi kemakmuran luar biasa. Disarankan untuk sering melakukan upacara syukur bersama.';
  else if (r.total >= 19) saran = 'Hubungan ini diberkati keharmonisan alami. Jaga komunikasi dan saling percaya.';
  else if (r.total >= 14) saran = 'Pasangan yang rukun, perlu usaha menjaga keseimbangan. Hindari konflik sepele.';
  else if (r.total >= 8) saran = 'Potensi cukup baik, perlu saling pengertian ekstra. Seringlah berdiskusi.';
  else saran = 'Tantangan dalam hubungan cukup besar, namun bukan berarti tidak bisa. Kunci: kesabaran dan saling memaafkan.';

  const html = `
    <h3 style="color:#C6A434; margin-bottom:16px;"><i class="fas fa-crown"></i> Analisis Mendalam Kecocokan ${r.name1} & ${r.name2}</h3>
    <p><strong>Weton Anda:</strong> ${r.weton1} (Neptu ${r.neptu1})</p>
    <p><strong>Weton Pasangan:</strong> ${r.weton2} (Neptu ${r.neptu2})</p>
    <p><strong>Total Neptu:</strong> ${r.total} → Kategori: <span style="color:#C6A434;">${r.category} (${r.status})</span></p>
    <p style="margin-top:16px;">${r.desc}</p>
    <p style="margin-top:16px; background:#0F111A; padding:16px; border-radius:16px;"><i class="fas fa-lightbulb"></i> <strong>Saran Spiritual:</strong> ${saran} Dalam tradisi Bali, pasangan dengan Neptu ini dianjurkan untuk melakukan upacara <em>mabyakala</em> atau <em>melukat</em> bersama untuk membersihkan energi negatif dan memperkuat ikatan.</p>
    <p style="margin-top:16px; font-style:italic;">Catatan: Ramalan ini bukan penentu mutlak. Cinta, komitmen, dan komunikasi adalah kunci utama kebahagiaan.</p>
  `;
  document.getElementById('premiumBox').innerHTML = html;
  document.getElementById('premiumBox').classList.remove('hidden');
}
</script>
</body>
</html>
